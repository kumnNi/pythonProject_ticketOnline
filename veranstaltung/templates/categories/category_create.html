





    <div class="navigation">
        {% include "navigation.html" %}
    </div>
<div class="content-container">
    <div class="form-card">
        <h1>{{ title }}</h1>
        <hr>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert"></div>
                {{ message }}
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-success" type="submit">Save</button>
            <button class="btn btn-danger" type="button" onclick="cancel()">Cancel</button>
        </form>
    </div>
</div>
<script>
  function cancel() {
    window.history.back();
  }
</script>
