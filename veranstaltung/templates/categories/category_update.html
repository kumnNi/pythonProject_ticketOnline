<body>
    <div class="navigation">
        {% include "navigation.html" %}
    </div>
<div class="content-container">
    <div class="form-card">

<form method="POST">
    {% csrf_token %}
    <div class="row">
        {{ form.as_p }}
    </div>
   <button class="btn btn-success" type="submit">Save</button>
    <button class="btn btn-danger" type="button" onclick="cancel()">Cancel</button>
</form>
  </div>
</div>
<script>
  function cancel() {
    window.history.back();
  }
</script>
</body>
